name: Test Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Build Docker image
      - name: Build Docker image
        run: docker build -t test-automation-pipeline .

      # Step 3: Create reports directory in GitHub runner (runner Ubuntu)
      - name: Create reports directory
        run: mkdir -p reports

      # Step 4: Run tests inside Docker container
      - name: Run tests
        run: docker run -v ${{ github.workspace }}/reports:/app/reports test-automation-pipeline

      # Step 5: Upload HTML report as artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()  # upload report even if tests fail
        with:
          name: test-report
          path: reports/report.html